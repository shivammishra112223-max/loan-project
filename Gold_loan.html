<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gold Loan Application</title>

<link rel="icon" type="image/jpeg" href="gold_loan.jpeg">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
  background:#f5f7fa;
  font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}
h5{
  margin-top:25px;
  border-bottom:2px solid #dee2e6;
  padding-bottom:5px;
}
</style>
</head>

<body class="p-4">

<div class="container">
<div class="card shadow-lg">
<div class="card-body p-4">

<h2 class="text-center mb-4">Gold Loan Application Form</h2>

<form action="http://127.0.0.1:5000/apply-loan"
      method="POST"
      enctype="multipart/form-data">

<!-- REQUIRED -->
<input type="hidden" name="loan_type" value="gold">
<input type="hidden" name="tenure_unit" value="months">

<!-- PERSONAL DETAILS (USERS TABLE) -->
<h5>Personal Details</h5>

<input type="text"
       name="full_name"
       class="form-control mb-2"
       placeholder="Full Name"
       required>

<input type="tel"
       name="mobile"
       class="form-control mb-2"
       placeholder="Mobile Number"
       pattern="[6-9]{1}[0-9]{9}"
       maxlength="10"
       required>

<input type="email"
       name="email"
       class="form-control mb-3"
       placeholder="Email ID">

<!-- INCOME -->
<h5>Income Details</h5>

<input type="number"
       name="monthly_income"
       class="form-control mb-3"
       placeholder="Monthly Income (₹)"
       required>

<!-- KYC -->
<h5>KYC Details</h5>

<input type="text"
       name="aadhaar"
       class="form-control mb-2"
       placeholder="Aadhaar Number"
       pattern="[0-9]{12}"
       maxlength="12"
       required>

<input type="text"
       name="pan"
       class="form-control mb-3"
       placeholder="PAN Number"
       pattern="[A-Z]{5}[0-9]{4}[A-Z]{1}"
       required>

<!-- ADDRESS -->
<h5>Address</h5>

<textarea name="address"
          class="form-control mb-3"
          placeholder="Full Address (City, State, Pincode)"
          rows="2"
          required></textarea>

<!-- LOAN DETAILS (LOANTYPES TABLE) -->
<h5>Loan Details</h5>

<input type="number"
       name="loan_amount"
       class="form-control mb-2"
       placeholder="Loan Amount Required (₹)"
       required>

<input type="number"
       name="tenure"
       class="form-control mb-3"
       placeholder="Tenure (Months)"
       required>

<!-- EXTRA GOLD DETAILS -->
<input type="hidden"
       name="loan_purpose"
       value="Gold Loan against pledged ornaments">

<!-- DOCUMENT UPLOAD (DOCUMENTS TABLE) -->
<h5>Upload Documents</h5>

<label>Aadhaar Card</label>
<input type="file"
       name="aadhaar_file"
       class="form-control mb-2"
       accept=".jpg,.jpeg,.png,.pdf"
       required>

<label>PAN Card</label>
<input type="file"
       name="pan_file"
       class="form-control mb-3"
       accept=".jpg,.jpeg,.png,.pdf"
       required>


<div class="col-md-4 mb-3">
  <label>Select Bank</label>
  <select name="bank" class="form-select" required>
    <option value="">Select Bank</option>
    <option value="SBI">State Bank of India</option>
    <option value="HDFC">HDFC Bank</option>
    <option value="ICICI">ICICI Bank</option>
    <option value="AXIS">Axis Bank</option>
  </select>
</div>


<!-- CONSENT -->
<div class="form-check mb-4">
  <input class="form-check-input"
         type="checkbox"
         name="consent"
         value="yes"
         required>
  <label class="form-check-label">
    I authorize the lender to verify my details and documents.
  </label>
</div>

<button type="submit" class="btn btn-success w-100">
  Apply for Gold Loan
</button>

</form>

</div>
</div>
</div>

</body>
</html>
