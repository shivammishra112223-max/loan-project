<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Home Loan Application</title>

<link rel="icon" type="image/jpeg" href="home_loan.jpeg">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
  background: linear-gradient(to right, #eef2f3, #f9fbfd);
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
.loan-card{ border-radius:12px; }
h2{ color:#2c3e50; font-weight:600; }
h5{ margin-top:30px; color:#0d6efd; border-bottom:2px solid #e9ecef; }
.form-control,.form-select{ border-radius:8px; }
textarea{ resize:none; }
.btn-submit{
  background: linear-gradient(to right, #198754, #28a745);
  border:none;
  padding:12px;
  font-size:16px;
  font-weight:600;
  border-radius:10px;
}
</style>
</head>

<body class="p-4">

<div class="container">
<div class="card loan-card shadow-lg">
<div class="card-body p-4">

<h2 class="text-center mb-4">Home Loan Application Form</h2>

<form action="http://127.0.0.1:5000/apply-loan"
      method="POST"
      enctype="multipart/form-data">

<!-- REQUIRED -->
<input type="hidden" name="loan_type" value="home">
<input type="hidden" name="tenure_unit" value="years">

<!-- PERSONAL DETAILS -->
<h5>Personal Details</h5>
<div class="row">
  <div class="col-md-6 mb-3">
    <label>Full Name</label>
    <input type="text" name="full_name" class="form-control" required>
  </div>
  <div class="col-md-3 mb-3">
    <label>Date of Birth</label>
    <input type="date" name="dob" class="form-control" required>
  </div>
  <div class="col-md-3 mb-3">
    <label>Gender</label>
    <select name="gender" class="form-select">
      <option>Male</option>
      <option>Female</option>
      <option>Other</option>
    </select>
  </div>
</div>

<div class="row">
  <div class="col-md-4 mb-3">
    <label>Mobile Number</label>
    <input type="tel"
           name="mobile"
           class="form-control"
           pattern="[6-9]{1}[0-9]{9}"
           maxlength="10"
           required>
  </div>
  <div class="col-md-4 mb-3">
    <label>Email</label>
    <input type="email" name="email" class="form-control">
  </div>
  <div class="col-md-4 mb-3">
    <label>Marital Status</label>
    <select name="marital_status" class="form-select">
      <option>Single</option>
      <option>Married</option>
    </select>
  </div>
</div>

<label>Residential Address</label>
<textarea name="address" class="form-control mb-3" rows="2" required></textarea>

<!-- KYC -->
<h5>KYC Details</h5>
<div class="row">
  <div class="col-md-6 mb-3">
    <label>PAN Number</label>
    <input type="text"
           name="pan"
           class="form-control"
           pattern="[A-Z]{5}[0-9]{4}[A-Z]{1}"
           placeholder="ABCDE1234F"
           required>
  </div>
  <div class="col-md-6 mb-3">
    <label>Aadhaar Number</label>
    <input type="text"
           name="aadhaar"
           class="form-control"
           pattern="[0-9]{12}"
           maxlength="12"
           required>
  </div>
</div>

<!-- EMPLOYMENT -->
<h5>Employment / Income</h5>
<div class="row">
  <div class="col-md-4 mb-3">
    <label>Employment Type</label>
    <select name="employment_type" class="form-select">
      <option>Salaried</option>
      <option>Self Employed</option>
    </select>
  </div>
  <div class="col-md-4 mb-3">
    <label>Company / Business Name</label>
    <input type="text" name="company_name" class="form-control">
  </div>
  <div class="col-md-4 mb-3">
    <label>Experience (Years)</label>
    <input type="number" name="experience" class="form-control">
  </div>
</div>

<label>Monthly Income</label>
<input type="number" name="monthly_income" class="form-control mb-3" required>

<!-- PROPERTY DETAILS -->
<h5>Property Details</h5>
<div class="row">
  <div class="col-md-4 mb-3">
    <label>Property Type</label>
    <select name="property_type" class="form-select">
      <option>Ready Property</option>
      <option>Under Construction</option>
      <option>Plot Purchase</option>
      <option>Home Construction</option>
    </select>
  </div>
  <div class="col-md-4 mb-3">
    <label>Property Value (₹)</label>
    <input type="number" name="property_value" class="form-control" required>
  </div>
  <div class="col-md-4 mb-3">
    <label>Ownership</label>
    <select name="ownership" class="form-select">
      <option>Self</option>
      <option>Joint</option>
    </select>
  </div>
</div>

<textarea name="property_address"
          class="form-control mb-3"
          placeholder="Property Address"
          rows="2"
          required></textarea>

<!-- LOAN DETAILS -->
<h5>Loan Details</h5>
<div class="row">
  <div class="col-md-4 mb-3">
    <label>Loan Amount (₹)</label>
    <input type="number" name="loan_amount" class="form-control" required>
  </div>
  <div class="col-md-4 mb-3">
    <label>Tenure (Years)</label>
    <select name="tenure" class="form-select">
      <option>5</option>
      <option>10</option>
      <option>15</option>
      <option>20</option>
      <option>25</option>
      <option>30</option>
    </select>
  </div>
  <div class="col-md-4 mb-3">
    <label>Loan Purpose</label>
    <input type="text"
           name="loan_purpose"
           class="form-control"
           value="Home Purchase / Construction">
  </div>
</div>

<!-- DOCUMENTS -->
<h5>Upload Documents</h5>

<input type="file" name="pan_file" class="form-control mb-2" required>
<input type="file" name="aadhaar_file" class="form-control mb-2" required>
<input type="file" name="income_proof" class="form-control mb-2" required>
<input type="file" name="property_docs" class="form-control mb-3" required>


<div class="col-md-4 mb-3">
  <label>Select Bank</label>
  <select name="bank" class="form-select" required>
    <option value="">Select Bank</option>
    <option value="SBI">State Bank of India</option>
    <option value="HDFC">HDFC Bank</option>
    <option value="ICICI">ICICI Bank</option>
    <option value="AXIS">Axis Bank</option>
  </select>
</div>



<!-- CONSENT -->
<div class="form-check mb-4">
  <input type="checkbox" name="consent" value="yes" class="form-check-input" required>
  <label class="form-check-label">
    I authorize the lender to verify my details and credit score.
  </label>
</div>

<button type="submit" class="btn btn-submit w-100">
  Submit Home Loan Application
</button>

</form>

</div>
</div>
</div>

</body>
</html>
