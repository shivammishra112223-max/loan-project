<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Business Loan Application</title>

<link rel="icon" type="image/jpeg" href="business_loan.jpeg">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
  background: linear-gradient(to right, #eef2f3, #ffffff);
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
.loan-card{border-radius:14px;}
h2{color:#2c3e50;font-weight:600;}
h5{margin-top:30px;color:#0d6efd;border-bottom:2px solid #dee2e6;}
.form-control,.form-select{border-radius:8px;}
.btn-submit{
  background:linear-gradient(to right,#0d6efd,#084298);
  border:none;
  padding:12px;
  font-size:16px;
  font-weight:600;
  border-radius:10px;
}
</style>
</head>

<body class="p-4">

<div class="container">
<div class="card loan-card shadow-lg">
<div class="card-body p-4">

<h2 class="text-center mb-4">Business Loan Application Form</h2>

<form action="http://127.0.0.1:5000/apply-loan"
      method="POST"
      enctype="multipart/form-data">

<!-- REQUIRED -->
<input type="hidden" name="loan_type" value="business">
<input type="hidden" name="tenure_unit" value="years">

<!-- APPLICANT DETAILS -->
<h5>Applicant Details</h5>
<div class="row">
  <div class="col-md-6 mb-3">
    <label>Full Name</label>
    <input type="text" name="full_name" class="form-control" required>
  </div>
  <div class="col-md-3 mb-3">
    <label>Date of Birth</label>
    <input type="date" name="dob" class="form-control" required>
  </div>
  <div class="col-md-3 mb-3">
    <label>Gender</label>
    <select name="gender" class="form-select">
      <option>Male</option>
      <option>Female</option>
      <option>Other</option>
    </select>
  </div>
</div>

<div class="row">
  <div class="col-md-4 mb-3">
    <label>Mobile Number</label>
    <input type="tel"
           name="mobile"
           class="form-control"
           pattern="[6-9]{1}[0-9]{9}"
           maxlength="10"
           required>
  </div>
  <div class="col-md-4 mb-3">
    <label>Email</label>
    <input type="email" name="email" class="form-control">
  </div>
  <div class="col-md-4 mb-3">
    <label>PAN Number</label>
    <input type="text"
           name="pan"
           class="form-control"
           pattern="[A-Z]{5}[0-9]{4}[A-Z]{1}"
           placeholder="ABCDE1234F"
           required>
  </div>
</div>

<label>Residential Address</label>
<textarea name="address" class="form-control mb-3" rows="2" required></textarea>

<!-- BUSINESS DETAILS -->
<h5>Business Details</h5>
<div class="row">
  <div class="col-md-4 mb-3">
    <label>Business Name</label>
    <input type="text" name="business_name" class="form-control" required>
  </div>
  <div class="col-md-4 mb-3">
    <label>Business Type</label>
    <select name="business_type" class="form-select">
      <option>Sole Proprietorship</option>
      <option>Partnership</option>
      <option>Private Limited</option>
      <option>LLP</option>
    </select>
  </div>
  <div class="col-md-4 mb-3">
    <label>Years in Business</label>
    <input type="number" name="business_vintage" class="form-control">
  </div>
</div>

<label>Business Address</label>
<textarea name="business_address" class="form-control mb-3" rows="2" required></textarea>

<div class="row">
  <div class="col-md-6 mb-3">
    <label>GST Number</label>
    <input type="text" name="gst" class="form-control">
  </div>
</div>

<!-- FINANCIAL DETAILS -->
<h5>Financial Details</h5>
<div class="row">
  <div class="col-md-4 mb-3">
    <label>Annual Turnover</label>
    <input type="number" name="turnover" class="form-control">
  </div>
  <div class="col-md-4 mb-3">
    <label>Monthly Profit</label>
    <input type="number" name="monthly_profit" class="form-control">
  </div>
  <div class="col-md-4 mb-3">
    <label>Existing Loan</label>
    <select name="existing_loan" class="form-select">
      <option>No</option>
      <option>Yes</option>
    </select>
  </div>
</div>

<!-- LOAN DETAILS -->
<h5>Loan Requirement</h5>
<div class="row">
  <div class="col-md-4 mb-3">
    <label>Loan Amount</label>
    <input type="number" name="loan_amount" class="form-control" required>
  </div>
  <div class="col-md-4 mb-3">
    <label>Tenure (Years)</label>
    <select name="tenure" class="form-select">
      <option>1</option>
      <option>3</option>
      <option>5</option>
      <option>7</option>
      <option>10</option>
    </select>
  </div>
  <div class="col-md-4 mb-3">
    <label>Loan Purpose</label>
    <select name="loan_purpose" class="form-select">
      <option>Working Capital</option>
      <option>Business Expansion</option>
      <option>Machinery Purchase</option>
      <option>Inventory</option>
    </select>
  </div>
</div>

<!-- DOCUMENT UPLOAD -->
<h5>Upload Documents</h5>

<label>PAN Card</label>
<input type="file" name="pan_file" class="form-control mb-2" accept=".pdf,.jpg,.jpeg" required>

<label>GST Certificate</label>
<input type="file" name="gst_file" class="form-control mb-2" accept=".pdf,.jpg,.jpeg">

<label>Bank Statement (Last 6 Months)</label>
<input type="file" name="bank_statement" class="form-control mb-2" accept=".pdf">

<label>Business Proof</label>
<input type="file" name="business_proof" class="form-control mb-3" accept=".pdf,.jpg,.jpeg">


<div class="col-md-4 mb-3">
  <label>Select Bank</label>
  <select name="bank" class="form-select" required>
    <option value="">Select Bank</option>
    <option value="SBI">State Bank of India</option>
    <option value="HDFC">HDFC Bank</option>
    <option value="ICICI">ICICI Bank</option>
    <option value="AXIS">Axis Bank</option>
  </select>
</div>

<!-- CONSENT -->
<div class="form-check mb-4">
  <input class="form-check-input" type="checkbox" name="consent" value="yes" required>
  <label class="form-check-label">
    I authorize verification and credit check (CIBIL)
  </label>
</div>

<button type="submit" class="btn btn-submit w-100">
  Submit Business Loan Application
</button>

</form>

</div>
</div>
</div>

</body>
</html>
