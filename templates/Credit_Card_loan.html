<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Credit Card Loan Application</title>

<link rel="icon" type="image/jpeg" href="credit_card_loan.jpeg">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
  background: linear-gradient(to right, #eef2f3, #ffffff);
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
.loan-card{border-radius:14px;}
h2{color:#2c3e50;font-weight:600;}
h5{margin-top:30px;color:#6f42c1;border-bottom:2px solid #dee2e6;}
.form-control,.form-select{border-radius:8px;}
.btn-submit{
  background:linear-gradient(to right,#6f42c1,#4c2a85);
  border:none;
  padding:12px;
  font-size:16px;
  font-weight:600;
  border-radius:10px;
}
</style>
</head>

<body class="p-4">

<div class="container">
<div class="card loan-card shadow-lg">
<div class="card-body p-4">

<h2 class="text-center mb-4">Credit Card Loan Application Form</h2>

<form action="http://127.0.0.1:5000/apply-loan"
      method="POST"
      enctype="multipart/form-data">

<!-- REQUIRED -->
<input type="hidden" name="loan_type" value="credit_card">
<input type="hidden" name="tenure_unit" value="months">

<!-- APPLICANT DETAILS -->
<h5>Applicant Details</h5>
<div class="row">
  <div class="col-md-6 mb-3">
    <label>Full Name (As per Card)</label>
    <input type="text" name="full_name" class="form-control" required>
  </div>
  <div class="col-md-3 mb-3">
    <label>Date of Birth</label>
    <input type="date" name="dob" class="form-control" required>
  </div>
  <div class="col-md-3 mb-3">
    <label>Gender</label>
    <select name="gender" class="form-select">
      <option>Male</option>
      <option>Female</option>
      <option>Other</option>
    </select>
  </div>
</div>

<div class="row">
  <div class="col-md-4 mb-3">
    <label>Mobile Number</label>
    <input type="tel"
           name="mobile"
           class="form-control"
           pattern="[6-9]{1}[0-9]{9}"
           maxlength="10"
           required>
  </div>
  <div class="col-md-4 mb-3">
    <label>Email</label>
    <input type="email" name="email" class="form-control">
  </div>
  <div class="col-md-4 mb-3">
    <label>City</label>
    <input type="text" name="city" class="form-control">
  </div>
</div>

<!-- CREDIT CARD DETAILS -->
<h5>Credit Card Details</h5>
<div class="row">
  <div class="col-md-4 mb-3">
    <label>Card Bank</label>
    <input type="text" name="card_bank" class="form-control" required>
  </div>
  <div class="col-md-4 mb-3">
    <label>Card Type</label>
    <select name="card_type" class="form-select">
      <option>Visa</option>
      <option>MasterCard</option>
      <option>RuPay</option>
      <option>American Express</option>
    </select>
  </div>
  <div class="col-md-4 mb-3">
    <label>Card Limit (₹)</label>
    <input type="number" name="card_limit" class="form-control">
  </div>
</div>

<div class="row">
  <div class="col-md-4 mb-3">
    <label>Last 4 Digits of Card</label>
    <input type="text"
           name="card_last4"
           class="form-control"
           pattern="[0-9]{4}"
           maxlength="4"
           required>
  </div>
  <div class="col-md-4 mb-3">
    <label>Card Vintage (Years)</label>
    <input type="number" name="card_vintage" class="form-control">
  </div>
  <div class="col-md-4 mb-3">
    <label>Outstanding Amount (₹)</label>
    <input type="number" name="outstanding" class="form-control">
  </div>
</div>

<!-- KYC DETAILS -->
<h5>KYC Details</h5>
<div class="row">
  <div class="col-md-6 mb-3">
    <label>PAN Number</label>
    <input type="text"
           name="pan"
           class="form-control"
           pattern="[A-Z]{5}[0-9]{4}[A-Z]{1}"
           placeholder="ABCDE1234F"
           required>
  </div>
  <div class="col-md-6 mb-3">
    <label>Aadhaar Number</label>
    <input type="text"
           name="aadhaar"
           class="form-control"
           pattern="[0-9]{12}"
           maxlength="12"
           required>
  </div>
</div>

<!-- EMPLOYMENT DETAILS -->
<h5>Employment / Income Details</h5>
<div class="row">
  <div class="col-md-4 mb-3">
    <label>Employment Type</label>
    <select name="employment_type" class="form-select">
      <option>Salaried</option>
      <option>Self Employed</option>
    </select>
  </div>
  <div class="col-md-4 mb-3">
    <label>Company / Business Name</label>
    <input type="text" name="company_name" class="form-control">
  </div>
  <div class="col-md-4 mb-3">
    <label>Monthly Income (₹)</label>
    <input type="number" name="monthly_income" class="form-control" required>
  </div>
</div>

<!-- LOAN DETAILS -->
<h5>Loan Requirement</h5>
<div class="row">
  <div class="col-md-4 mb-3">
    <label>Loan Amount Required (₹)</label>
    <input type="number" name="loan_amount" class="form-control" required>
  </div>
  <div class="col-md-4 mb-3">
    <label>Loan Mode</label>
    <select name="loan_purpose" class="form-select">
      <option>Instant Credit Card Loan</option>
      <option>Card EMI Conversion</option>
      <option>Cash Withdrawal Loan</option>
    </select>
  </div>
  <div class="col-md-4 mb-3">
    <label>Tenure (Months)</label>
    <select name="tenure" class="form-select">
      <option>6</option>
      <option>12</option>
      <option>18</option>
      <option>24</option>
      <option>36</option>
    </select>
  </div>
</div>

<!-- DOCUMENT UPLOAD -->
<h5>Upload Documents</h5>

<label>PAN Card</label>
<input type="file" name="pan_file" class="form-control mb-2" accept=".pdf,.jpg,.jpeg" required>

<label>Aadhaar Card</label>
<input type="file" name="aadhaar_file" class="form-control mb-2" accept=".pdf,.jpg,.jpeg" required>

<label>Income Proof / Bank Statement</label>
<input type="file" name="income_proof" class="form-control mb-3" accept=".pdf">

<div class="col-md-4 mb-3">
  <label>Select Bank</label>
  <select name="bank" class="form-select" required>
    <option value="">Select Bank</option>
    <option value="SBI">State Bank of India</option>
    <option value="HDFC">HDFC Bank</option>
    <option value="ICICI">ICICI Bank</option>
    <option value="AXIS">Axis Bank</option>
  </select>
</div>

<!-- CONSENT -->
<div class="form-check mb-4">
  <input class="form-check-input" type="checkbox" name="consent" value="yes" required>
  <label class="form-check-label">
    I authorize verification and credit score check (CIBIL)
  </label>
</div>

<button type="submit" class="btn btn-submit w-100">
  Submit Credit Card Loan Application
</button>

</form>

</div>
</div>
</div>

</body>
</html>
