<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Education Loan Application</title>

<link rel="icon" type="image/jpeg" href="education_loan.jpeg">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
  background: linear-gradient(to right, #eef2f3, #ffffff);
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
.loan-card{border-radius:14px;}
h2{color:#2c3e50;font-weight:600;}
h5{margin-top:30px;color:#0d6efd;border-bottom:2px solid #dee2e6;}
.form-control,.form-select{border-radius:8px;}
.btn-submit{
  background:linear-gradient(to right,#0d6efd,#084298);
  border:none;padding:12px;font-size:16px;font-weight:600;border-radius:10px;
}
</style>
</head>

<body class="p-4">

<div class="container">
<div class="card loan-card shadow-lg">
<div class="card-body p-4">

<h2 class="text-center mb-4">Education Loan Application Form</h2>

<form action="http://127.0.0.1:5000/apply-loan"
      method="POST"
      enctype="multipart/form-data">

<!-- REQUIRED -->
<input type="hidden" name="loan_type" value="education">
<input type="hidden" name="tenure_unit" value="years">

<!-- STUDENT DETAILS (USERS TABLE) -->
<h5>Student Details</h5>
<div class="row">
  <div class="col-md-6 mb-3">
    <label>Student Full Name</label>
    <input type="text" name="full_name" class="form-control" required>
  </div>
  <div class="col-md-3 mb-3">
    <label>Date of Birth</label>
    <input type="date" name="dob" class="form-control" required>
  </div>
  <div class="col-md-3 mb-3">
    <label>Gender</label>
    <select name="gender" class="form-select">
      <option>Male</option>
      <option>Female</option>
      <option>Other</option>
    </select>
  </div>
</div>

<div class="row">
  <div class="col-md-4 mb-3">
    <label>Mobile Number</label>
    <input type="tel" name="mobile" class="form-control"
           pattern="[6-9]{1}[0-9]{9}" maxlength="10" required>
  </div>
  <div class="col-md-4 mb-3">
    <label>Email</label>
    <input type="email" name="email" class="form-control">
  </div>
  <div class="col-md-4 mb-3">
    <label>Monthly Income (Family)</label>
    <input type="number" name="monthly_income" class="form-control">
  </div>
</div>

<label>Residential Address</label>
<textarea name="address" class="form-control mb-3" rows="2" required></textarea>

<!-- KYC -->
<h5>KYC Details</h5>
<div class="row">
  <div class="col-md-6 mb-3">
    <label>PAN Number (Co-Applicant)</label>
    <input type="text" name="pan" class="form-control"
           pattern="[A-Z]{5}[0-9]{4}[A-Z]{1}" required>
  </div>
  <div class="col-md-6 mb-3">
    <label>Aadhaar Number (Student)</label>
    <input type="text" name="aadhaar" class="form-control"
           pattern="[0-9]{12}" maxlength="12" required>
  </div>
</div>

<!-- COURSE DETAILS -->
<h5>Course & College Details</h5>
<div class="row">
  <div class="col-md-6 mb-3">
    <label>Course Name</label>
    <input type="text" name="course_name" class="form-control" required>
  </div>
  <div class="col-md-3 mb-3">
    <label>Course Duration (Years)</label>
    <input type="number" name="duration" class="form-control">
  </div>
  <div class="col-md-3 mb-3">
    <label>Study Location</label>
    <select name="loan_purpose" class="form-select">
      <option>India Education</option>
      <option>Abroad Education</option>
    </select>
  </div>
</div>

<label>College / University Name</label>
<input type="text" name="college" class="form-control mb-3" required>

<label>College Address</label>
<textarea name="college_address" class="form-control mb-3" rows="2" required></textarea>

<!-- LOAN DETAILS -->
<h5>Loan Requirement</h5>
<div class="row">
  <div class="col-md-6 mb-3">
    <label>Loan Amount Required</label>
    <input type="number" name="loan_amount" class="form-control" required>
  </div>
  <div class="col-md-6 mb-3">
    <label>Loan Tenure (Years)</label>
    <select name="tenure" class="form-select">
      <option>5</option>
      <option>7</option>
      <option>10</option>
      <option>15</option>
    </select>
  </div>
</div>

<!-- DOCUMENT UPLOAD -->
<h5>Upload Documents</h5>

<label>Student Aadhaar Card</label>
<input type="file" name="aadhaar_file" class="form-control mb-2" accept=".pdf,.jpg,.jpeg" required>

<label>Co-Applicant PAN Card</label>
<input type="file" name="pan_file" class="form-control mb-2" accept=".pdf,.jpg,.jpeg" required>

<label>Admission Letter</label>
<input type="file" name="admission_letter" class="form-control mb-2" accept=".pdf" required>

<label>Fee Structure</label>
<input type="file" name="fee_structure" class="form-control mb-3" accept=".pdf" required>

<div class="col-md-4 mb-3">
  <label>Select Bank</label>
  <select name="bank" class="form-select" required>
    <option value="">Select Bank</option>
    <option value="SBI">State Bank of India</option>
    <option value="HDFC">HDFC Bank</option>
    <option value="ICICI">ICICI Bank</option>
    <option value="AXIS">Axis Bank</option>
  </select>
</div>



<!-- CONSENT -->
<div class="form-check mb-4">
  <input class="form-check-input" type="checkbox" name="consent" value="yes" required>
  <label class="form-check-label">
    I authorize verification of documents and credit history.
  </label>
</div>

<button type="submit" class="btn btn-submit w-100">
  Submit Education Loan Application
</button>

</form>

</div>
</div>
</div>

</body>
</html>
