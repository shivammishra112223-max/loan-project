<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Agriculture Loan Application</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
  font-family: Arial, sans-serif;
  background:#eef2f3;
  padding:20px;
}
.container{
  max-width:1100px;
  background:#ffffff;
  padding:25px;
  border-radius:6px;
  box-shadow:0 0 12px rgba(0,0,0,0.1);
}
h1{text-align:center;color:#2c3e50;}
h2{margin-top:25px;background:#f4f6f7;padding:8px;border-left:5px solid #27ae60;}
.form-row{display:flex;gap:15px;margin-bottom:15px;}
.form-group{flex:1;}
label{font-weight:bold;}
input,select,textarea{
  width:100%;
  padding:8px;
  border:1px solid #ccc;
  border-radius:4px;
}
button{
  background:#27ae60;
  color:#fff;
  padding:12px 30px;
  border:none;
  border-radius:4px;
}
</style>
</head>

<body>
<div class="container">

<h1>Agriculture Loan (Krishi Loan) Application</h1>

<form action="http://127.0.0.1:5000/apply-loan"
      method="POST"
      enctype="multipart/form-data">

<!-- REQUIRED HIDDEN FIELDS -->
<input type="hidden" name="loan_type" value="agriculture">
<input type="hidden" name="tenure_unit" value="months">

<!-- PERSONAL DETAILS -->
<h2>Personal Details</h2>
<div class="form-row">
  <div class="form-group">
    <label>Farmer Name</label>
    <input type="text" name="full_name" required>
  </div>
  <div class="form-group">
    <label>Age</label>
    <input type="number" name="age">
  </div>
  <div class="form-group">
    <label>Gender</label>
    <select name="gender">
      <option>Male</option>
      <option>Female</option>
      <option>Other</option>
    </select>
  </div>
</div>

<div class="form-row">
  <div class="form-group">
    <label>Mobile Number</label>
    <input type="tel"
           name="mobile"
           pattern="[6-9]{1}[0-9]{9}"
           required>
  </div>
  <div class="form-group">
    <label>Email</label>
    <input type="email" name="email">
  </div>
</div>

<div class="form-row">
  <div class="form-group">
    <label>Marital Status</label>
    <select name="marital_status">
      <option>Single</option>
      <option>Married</option>
    </select>
  </div>
</div>

<label>Residential Address</label>
<textarea name="address" rows="2" required></textarea>

<!-- KYC DETAILS -->
<h2>KYC Details</h2>
<div class="form-row">
  <div class="form-group">
    <label>Aadhaar Number</label>
    <input type="text" name="aadhaar" required>
  </div>
  <div class="form-group">
    <label>PAN Number</label>
    <input type="text" name="pan" required>
  </div>
</div>

<!-- LAND DETAILS -->
<h2>Land / Farm Details</h2>
<div class="form-row">
  <div class="form-group">
    <label>Land Ownership</label>
    <select name="land_ownership">
      <option>Self</option>
      <option>Joint</option>
      <option>Leased</option>
    </select>
  </div>
  <div class="form-group">
    <label>Total Land Area (Acres)</label>
    <input type="number" name="land_area">
  </div>
</div>

<div class="form-row">
  <div class="form-group">
    <label>Survey / Khata Number</label>
    <input type="text" name="survey_number">
  </div>
  <div class="form-group">
    <label>Village / District</label>
    <input type="text" name="village">
  </div>
</div>

<label>Land Address</label>
<textarea name="land_address" rows="2"></textarea>

<!-- CROP DETAILS -->
<h2>Crop Details</h2>
<div class="form-row">
  <div class="form-group">
    <label>Crop Type</label>
    <input type="text" name="crop_type">
  </div>
  <div class="form-group">
    <label>Season</label>
    <select name="season">
      <option>Kharif</option>
      <option>Rabi</option>
      <option>Zaid</option>
    </select>
  </div>
</div>

<div class="form-row">
  <div class="form-group">
    <label>Irrigation Source</label>
    <select name="irrigation">
      <option>Rain Fed</option>
      <option>Canal</option>
      <option>Borewell</option>
    </select>
  </div>
  <div class="form-group">
    <label>Expected Yield</label>
    <input type="number" name="expected_yield">
  </div>
</div>

<!-- LOAN DETAILS -->
<h2>Loan Details</h2>
<div class="form-row">
  <div class="form-group">
    <label>Loan Amount</label>
    <input type="number" name="loan_amount" required>
  </div>
  <div class="form-group">
    <label>Loan Purpose</label>
    <select name="loan_purpose">
      <option>Seeds</option>
      <option>Machinery</option>
      <option>Irrigation</option>
    </select>
  </div>
</div>

<div class="form-row">
  <div class="form-group">
    <label>Tenure (Months)</label>
    <input type="number" name="tenure">
  </div>
  <div class="form-group">
    <label>Repayment Mode</label>
    <select name="repayment_mode">
      <option>Crop Cycle</option>
      <option>EMI</option>
    </select>
  </div>
</div>

<!-- EXISTING LOAN -->
<h2>Existing Loan Details</h2>
<div class="form-row">
  <div class="form-group">
    <label>Any Existing Loan?</label>
    <select name="existing_loan">
      <option>No</option>
      <option>Yes</option>
    </select>
  </div>
  <div class="form-group">
    <label>Total EMI</label>
    <input type="number" name="total_emi">
  </div>
</div>

<!-- DOCUMENT UPLOAD -->
<h2>Documents Upload</h2>

<div class="form-group mb-3">
  <label>Aadhaar Card</label>
  <input type="file" name="aadhaar_file" accept=".pdf,.jpg,.jpeg" required>
</div>

<div class="form-group mb-3">
  <label>Land Ownership Documents</label>
  <input type="file" name="land_docs" accept=".pdf,.jpg,.jpeg" required>
</div>

<div class="form-group mb-3">
  <label>Income / Crop Proof</label>
  <input type="file" name="income_proof" accept=".pdf,.jpg,.jpeg" required>
</div>


<div class="col-md-4 mb-3">
  <label>Select Bank</label>
  <select name="bank" class="form-select" required>
    <option value="">Select Bank</option>
    <option value="SBI">State Bank of India</option>
    <option value="HDFC">HDFC Bank</option>
    <option value="ICICI">ICICI Bank</option>
    <option value="AXIS">Axis Bank</option>
  </select>
</div>
<!-- CONSENT -->
 


<br><br>
<button type="submit" class="btn btn-primary w-100">
  Submit Agriculture Loan Application
</button>

</form>
</div>
</body>
</html>
